<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <title>flowl — Offline</title>
    <script>
      (() => {
        const storageKey = "flowl.theme";
        const valid = new Set(["light", "dark", "system"]);
        let preference = "system";
        try {
          const stored = localStorage.getItem(storageKey);
          if (valid.has(stored)) preference = stored;
        } catch {}
        const prefersDark =
          typeof window !== "undefined" &&
          typeof window.matchMedia === "function" &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        const resolved =
          preference === "system"
            ? prefersDark
              ? "dark"
              : "light"
            : preference;
        document.documentElement.dataset.theme = resolved;

        var i18n = {
          en: {
            title: "You\u2019re offline",
            body: "Check your connection and try again. Your plants are still growing.",
            retry: "Retry",
          },
          de: {
            title: "Du bist offline",
            body: "Pr\u00fcfe deine Verbindung und versuche es erneut. Deinen Pflanzen geht es gut.",
            retry: "Erneut versuchen",
          },
          es: {
            title: "Sin conexi\u00f3n",
            body: "Comprueba tu conexi\u00f3n e int\u00e9ntalo de nuevo. Tus plantas siguen creciendo.",
            retry: "Reintentar",
          },
        };
        var locale = "en";
        try {
          var stored = localStorage.getItem("flowl.locale");
          if (stored && i18n[stored]) locale = stored;
        } catch {}
        var t = i18n[locale];
        document.addEventListener("DOMContentLoaded", function () {
          document.getElementById("offline-title").textContent = t.title;
          document.getElementById("offline-body").textContent = t.body;
          document.getElementById("offline-retry").textContent = t.retry;
        });
      })();
    </script>
    <style>
      :root {
        --bg: #faf6f1;
        --text: #2c2418;
        --text-muted: #736556;
        --primary: #6b8f71;
      }
      [data-theme="dark"] {
        --bg: #1a1612;
        --text: #ede6db;
        --text-muted: #b5a899;
        --primary: #8bb592;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        padding: 24px;
        text-align: center;
      }
      .logo {
        margin-bottom: 16px;
        color: var(--primary);
      }
      h1 {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      p {
        font-size: 15px;
        color: var(--text-muted);
        max-width: 320px;
        line-height: 1.5;
      }
      .retry {
        margin-top: 24px;
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 500;
        color: white;
        background: var(--primary);
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }
      .retry:active {
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <svg
        class="logo"
        aria-hidden="true"
        xmlns="http://www.w3.org/2000/svg"
        width="48"
        height="48"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path d="M11 9a6 6 0 0 1-6-7 6 6 0 0 1 6 7" fill="none" />
        <path d="M13 9a5 5 0 0 0 5-5 5 5 0 0 0-5 5" fill="none" />
        <ellipse cx="12" cy="14.5" rx="6.5" ry="5.5" />
        <circle cx="9.5" cy="13.5" r="2.3" />
        <circle cx="14.5" cy="13.5" r="2.3" />
        <circle cx="9.5" cy="13.5" r="0.9" fill="currentColor" stroke="none" />
        <circle cx="14.5" cy="13.5" r="0.9" fill="currentColor" stroke="none" />
        <path d="M11.2 16.8L12 17.8l.8-1" fill="currentColor" stroke="none" />
      </svg>
      <h1 id="offline-title">You're offline</h1>
      <p id="offline-body">
        Check your connection and try again. Your plants are still growing.
      </p>
      <button id="offline-retry" class="retry" onclick="location.reload()">
        Retry
      </button>
    </div>
  </body>
</html>
